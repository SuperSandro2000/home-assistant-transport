# Example configuration for Dresden Transport sensor

# Configuration for sensor platform
sensor:
  - platform: dresden_transport
    departures:
      # Show all departures from a stop
      - name: "Hauptbahnhof All Departures"
        stop_id: 33000013
        walking_time: 2
        
      # Filter by specific line
      - name: "Tram Line 4"
        stop_id: 33000013
        line_name: "4"
        walking_time: 2
        
      # Filter by line and direction
      - name: "Tram 4 to Weinböhla"
        stop_id: 33000013
        line_name: "4" 
        direction: "Weinböhla"
        walking_time: 2
        
      # Filter by line and platform
      - name: "Tram 4 Platform 1"
        stop_id: 33000013
        line_name: "4"
        platform: "1"
        walking_time: 2
        
      # Bus example with direction filter
      - name: "Bus 61 to Airport"
        stop_id: 33000018
        line_name: "61"
        direction: "Flughafen"
        walking_time: 5

